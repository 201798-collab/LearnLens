<!DOCTYPE html>
<html>
<head>
    <title>LearnLens</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="login" class="card">
        <h1>LearnLens</h1>
        <input type="email" id="userEmail" placeholder="School Gmail ID">
        <select id="role"><option value="student">Student</option><option value="teacher">Teacher</option></select>
        <button onclick="login()">Enter</button>
    </div>

    <div id="dashboard" class="card" style="display:none;">
        <canvas id="myChart"></canvas>
        <div id="content"></div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzuGrWCRZtSkJ7LayV_qTbVRcE29LdKvnV_DZzcxfyyJbvJlEmihrKrqjIGZr65jiiE/exec";

    async function login() {
        document.getElementById('login').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            render(data);
        } catch (err) {
            console.error("Fetch failed. Open the URL directly to see if it's a Login Page:", API_URL);
            alert("Error loading data. Check console (F12).");
        }
    }

    function render(data) {
        const role = document.getElementById('role').value;
        const content = document.getElementById('content');
        
        if(role === 'student') {
            content.innerHTML = `<input type="text" id="topic" placeholder="Doubt"><button onclick="submitDoubt()">Submit</button>`;
        } else {
            content.innerHTML = data.map(d => `<p>${d.email}: ${d.topic}</p>`).join('');
        }
    }

    async function submitDoubt() {
        await fetch(API_URL, { 
            method: 'POST', 
            body: JSON.stringify({
                email: document.getElementById('userEmail').value,
                subject: "General",
                topic: document.getElementById('topic').value
            })
        });
        location.reload();
    }
</script>
</body>
</html>
