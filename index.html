<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LearnLens Advanced</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6a5acd; --bg: #f4f4f9; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        canvas { max-height: 300px; }
    </style>
</head>
<body>
    <div id="app" style="max-width: 600px; margin: auto;">
        <div id="login" class="card">
            <h1>LearnLens</h1>
            <input type="text" id="username" placeholder="Name">
            <select id="role"><option value="student">Student</option><option value="teacher">Teacher</option></select>
            <button onclick="login()">Enter</button>
        </div>

        <div id="dashboard" class="hidden">
            <h2 id="greet"></h2>
            <div class="card">
                <canvas id="myChart"></canvas>
            </div>
            <div id="content"></div>
        </div>
    </div>

<script>
    const API_URL = "YOUR_GOOGLE_SCRIPT_URL_HERE";
    let userData = [];

    async function fetchData() {
        const res = await fetch(API_URL);
        const rawData = await res.json();
        
        // Processing: Grouping duplicates, Case Insensitive
        let counts = {};
        rawData.forEach(d => {
            let key = d.topic.toLowerCase().trim();
            counts[key] = (counts[key] || 0) + 1;
        });

        renderDashboard(counts, rawData);
    }

    function renderDashboard(counts, rawData) {
        // Charting
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(counts),
                datasets: [{ label: 'Students Confused', data: Object.values(counts), backgroundColor: '#6a5acd' }]
            }
        });

        // Content
        const content = document.getElementById('content');
        if (document.getElementById('role').value === 'student') {
            content.innerHTML = Object.keys(counts).map(topic => 
                `<p><b>${topic}</b> — ${counts[topic]} student(s) have this doubt</p>`).join('');
        } else {
            content.innerHTML = rawData.map(d => `<p>${d.name} needs help: ${d.topic}</p>`).join('');
        }
    }

    function login() {
        document.getElementById('login').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        fetchData();
    }
</script>
</body>
</html>
